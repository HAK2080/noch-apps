<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>نوش — ماتشا ولا قهوة؟</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=DM+Sans:wght@400;500;700&family=Cairo:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @font-face{font-family:'BehanceAr';src:url('assets/fonts/Behance-Arabic.ttf') format('truetype');font-display:swap}
  :root{
    --blue:#1E3A9F;--blue-deep:#142974;
    --orange:#E86A1E;--orange-light:#F5922E;--orange-deep:#C54E0A;
    --pink:#F3B6CE;--cream:#FBF3E3;--ink:#0B1020;
    --shadow:8px 8px 0 var(--ink);--shadow-lg:12px 12px 0 var(--ink);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;overflow-x:hidden}
  [lang="ar"]{font-family:'Cairo','BehanceAr',sans-serif}
  [lang="ar"] .display-ar{font-family:'BehanceAr','Cairo',sans-serif}
  a{color:inherit;text-decoration:none}img{display:block;max-width:100%}

  .nav-bar{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:50;width:min(94%,1160px)}
  .nav{display:flex;justify-content:space-between;align-items:center;background:var(--orange);border-radius:999px;padding:8px 10px 8px 14px;border:2px solid var(--ink);box-shadow:6px 6px 0 var(--ink)}
  .nav-logo img{height:36px;width:auto}
  .nav-links{display:flex;gap:2px}
  .nav-links a{padding:8px 14px;border-radius:999px;font-size:15px;font-weight:700;transition:all .15s;color:var(--cream)}
  .nav-links a:hover{background:var(--cream);color:var(--orange)}
  .nav-right{display:flex;gap:6px;align-items:center}
  .staff-lnk{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;opacity:.8;padding:4px 10px;border:1px dashed var(--cream);border-radius:999px;color:var(--cream)}
  .staff-lnk:hover{opacity:1;background:var(--cream);color:var(--orange)}
  .lang-btn{background:var(--blue);color:var(--cream);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;border:2px solid var(--cream);cursor:pointer}
  @media(max-width:760px){.nav-links{display:none}}

  .hero{position:relative;overflow:hidden;background:transparent;padding-bottom:20px;z-index:1}
  .rolling-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
  .rolling-bg svg{width:100%;height:100%;display:block}

  .hero-content{position:relative;z-index:5;max-width:1160px;margin:0 auto;padding:110px 40px 100px}
  .hero-layout{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;max-width:1160px;margin:0 auto}
  @media(max-width:900px){.hero-layout{grid-template-columns:1fr;text-align:center;gap:20px}}
  .nochi-pill{display:inline-flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--ink);border-radius:999px;padding:10px 22px;box-shadow:3px 3px 0 var(--pink);font-weight:700;font-size:15px;margin-bottom:28px}
  .nochi-pill img{width:24px;height:24px;border-radius:50%}
  .hero h1{font-family:'Baloo 2';font-weight:800;font-size:clamp(42px,6vw,88px);line-height:.94;letter-spacing:-2px;color:var(--ink);max-width:600px}
  [lang="ar"] .hero h1{font-family:'BehanceAr','Cairo',sans-serif;font-size:clamp(36px,5.5vw,76px);line-height:1.15;letter-spacing:0}
  .hero h1 .blue{color:var(--blue)}
  .hero h1 .orange-pill{display:inline-block;background:var(--orange);color:#fff;padding:0 24px;border-radius:999px;box-shadow:6px 6px 0 var(--ink);transform:rotate(-1.5deg);white-space:nowrap}
  [dir="rtl"] .hero h1 .orange-pill{transform:rotate(1.5deg)}
  .hero-sub{margin:16px 0 0;font-size:14px;line-height:1.6;max-width:none;color:#3a436b;white-space:nowrap}
  @media(max-width:900px){.hero-sub{white-space:normal;text-align:center}}
  @media(max-width:900px){.hero-sub{margin:12px auto 0;text-align:center}}
  .hero-ctas{margin-top:32px;display:flex;gap:12px;flex-wrap:wrap}
  @media(max-width:900px){.hero-ctas{justify-content:center}}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:999px;font-weight:800;font-size:14px;border:2.5px solid var(--ink);transition:transform .2s,box-shadow .2s;cursor:pointer;box-shadow:4px 4px 0 var(--ink)}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink)}
  .btn.primary{background:var(--orange);color:#fff}
  .btn.secondary{background:var(--pink);color:var(--blue-deep)}
  .hero-mascot{width:min(320px,85%);margin:0 auto;filter:drop-shadow(8px 10px 0 rgba(11,16,32,.12));transition:transform .4s cubic-bezier(.2,.8,.2,1)}
  .hero-mascot:hover{transform:translateY(-8px) rotate(-2deg)}
  @media(max-width:900px){.hero-mascot{width:min(200px,50vw);margin-top:0;order:-1}}

  .big3-section{padding:30px 40px 50px;background:transparent;position:relative;z-index:1}
  .big3-wrap{max-width:1160px;margin:0 auto}
  .big3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  @media(max-width:820px){.big3{grid-template-columns:1fr}}
  .tile{position:relative;overflow:hidden;border-radius:28px;background:linear-gradient(155deg,var(--orange-light) 0%,var(--orange) 50%,var(--orange-deep) 100%);color:var(--ink);border:3px solid var(--ink);box-shadow:var(--shadow-lg);min-height:320px;padding:28px;display:flex;flex-direction:column;transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s;cursor:pointer}
  .tile:hover{transform:translate(-5px,-5px);box-shadow:18px 18px 0 var(--ink)}
  .tile:hover .tile-mascot{transform:translateY(-8px) rotate(-6deg) scale(1.06)}
  [dir="rtl"] .tile:hover .tile-mascot{transform:translateY(-8px) rotate(6deg) scale(1.06)}
  .tile:hover .tile-arrow{transform:translate(4px,-4px)}
  .tile-kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.7;font-weight:600}
  [lang="ar"] .tile-kicker{font-family:'Cairo',sans-serif;letter-spacing:0}
  .tile-title{font-family:'Baloo 2';font-weight:800;font-size:clamp(38px,5vw,52px);line-height:.9;letter-spacing:-2px;margin-top:8px;color:var(--ink)}
  [lang="ar"] .tile-title{font-family:'BehanceAr','Cairo',sans-serif;font-size:clamp(32px,4.5vw,44px);line-height:1.1;letter-spacing:0}
  .tile-desc{font-size:14px;margin-top:10px;max-width:70%;opacity:.85;line-height:1.45}
  .tile-arrow{position:absolute;top:24px;right:24px;width:48px;height:48px;border-radius:50%;background:var(--ink);color:var(--cream);display:grid;place-items:center;font-size:20px;transition:transform .25s;box-shadow:3px 3px 0 rgba(0,0,0,.2)}
  [dir="rtl"] .tile-arrow{right:auto;left:24px}
  .tile-mascot{position:absolute;bottom:-8px;right:-6px;width:130px;height:130px;object-fit:contain;object-position:bottom right;transition:transform .35s cubic-bezier(.2,.8,.2,1);filter:drop-shadow(4px 4px 0 rgba(11,16,32,.2));pointer-events:none}
  .tile-mascot.size-lg{width:155px;height:155px;bottom:-10px;right:-8px}
  .tile-mascot.shift-left{right:6px}
  .tile-mascot.shift-bottom{bottom:-16px;top:auto}
  .tile-mascot.shift-right{right:-10px}
  [dir="rtl"] .tile-mascot{right:auto;left:-6px}
  .tile .soon-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;border:2px solid var(--ink);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-top:auto;width:fit-content;background:rgba(255,255,255,.3);font-weight:700}

  .sec{padding:10px 40px 80px;position:relative;z-index:1}
  .sec-wrap{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:820px){.sec-wrap{grid-template-columns:1fr}}
  .sec-tile{position:relative;overflow:hidden;border-radius:28px;border:3px solid var(--ink);background:linear-gradient(155deg,var(--orange-light) 0%,var(--orange) 50%,var(--orange-deep) 100%);color:var(--ink);box-shadow:var(--shadow-lg);padding:28px;min-height:200px;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s;cursor:pointer}
  .sec-tile:hover{transform:translate(-4px,-4px);box-shadow:16px 16px 0 var(--ink)}
  .sec-tile:hover .mini-m{transform:rotate(-5deg) translateY(-6px)}
  [dir="rtl"] .sec-tile:hover .mini-m{transform:rotate(5deg) translateY(-6px)}
  .sec-tile .k{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.7;font-weight:600}
  [lang="ar"] .sec-tile .k{font-family:'Cairo',sans-serif;letter-spacing:0}
  .sec-tile h3{font-family:'Baloo 2';font-weight:800;font-size:36px;line-height:.95;letter-spacing:-1px;margin-top:6px}
  [lang="ar"] .sec-tile h3{font-family:'BehanceAr','Cairo',sans-serif;letter-spacing:0;font-size:32px;line-height:1.1}
  .sec-tile p{font-size:14px;margin-top:8px;max-width:60%;opacity:.85;line-height:1.4}
  .sec-tile .mini-m{position:absolute;bottom:-8px;right:-6px;width:140px;height:140px;object-fit:contain;object-position:bottom right;transition:transform .35s cubic-bezier(.2,.8,.2,1);pointer-events:none;filter:drop-shadow(3px 3px 0 rgba(11,16,32,.18))}
  .sec-tile .mini-m.size-lg{width:160px;height:160px;bottom:-10px}
  .sec-tile .mini-m.shift-left{right:6px}
  [dir="rtl"] .sec-tile .mini-m{right:auto;left:-6px}
  .sec-tile .tile-arrow{position:absolute;top:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--ink);color:var(--cream);display:grid;place-items:center;font-size:18px}
  [dir="rtl"] .sec-tile .tile-arrow{right:auto;left:24px}

  .footer-wave{width:100%;overflow:hidden;line-height:0;position:relative;z-index:2;margin-top:20px}
  .footer-wave svg{display:block;width:100%;height:90px}
  .footer{background:#1E3A9F;color:var(--cream);padding:36px 40px 30px;position:relative;z-index:2;margin-top:0}
  .footer-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px}
  @media(max-width:820px){.footer-inner{grid-template-columns:1fr}}
  .footer h4{font-family:'Baloo 2';font-weight:800;font-size:60px;line-height:.88;letter-spacing:-2px;color:#fff}
  .footer h4 em{font-style:normal;color:var(--orange)}
  .footer h5{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.8;margin-bottom:12px;color:#fff}
  [lang="ar"] .footer h5{font-family:'Cairo',sans-serif;letter-spacing:0}
  .footer ul{list-style:none;display:flex;flex-direction:column;gap:6px;font-size:14px;color:#fff}
  .footer ul a{color:#fff}.footer ul a:hover{color:var(--pink)}
  .footer-bot{max-width:1160px;margin:30px auto 0;padding-top:16px;border-top:1px solid rgba(255,255,255,.2);font-size:11px;opacity:.7;color:#fff;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

  .tweaks-panel{position:fixed;right:16px;bottom:16px;z-index:200;background:#fff;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow-lg);width:340px;max-height:calc(100vh - 32px);overflow-y:auto;display:none;flex-direction:column}
  .tweaks-panel.open{display:flex}
  .tweaks-header{padding:14px 18px;border-bottom:2px solid var(--ink);display:flex;justify-content:space-between;align-items:center;background:var(--orange);border-radius:17px 17px 0 0}
  .tweaks-header h4{font-family:'Baloo 2';font-weight:800;font-size:20px;color:#fff}
  .tweaks-close{background:none;border:none;font-size:20px;cursor:pointer;color:#fff;font-weight:800}
  .tweaks-body{padding:16px 18px;display:flex;flex-direction:column;gap:20px}
  .tweak-group label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;color:#485070}
  .tweak-slot{display:flex;flex-wrap:wrap;gap:6px}
  .tweak-slot-label{font-family:'Baloo 2';font-weight:800;font-size:13px;color:var(--ink);margin-bottom:4px;width:100%}
  .pose-btn{width:48px;height:48px;border-radius:12px;border:2px solid var(--ink);background:var(--cream);padding:4px;cursor:pointer;transition:all .15s;overflow:hidden;display:grid;place-items:center}
  .pose-btn img{width:100%;height:100%;object-fit:contain}
  .pose-btn.active{background:var(--orange);border-color:var(--orange);box-shadow:3px 3px 0 var(--ink)}
  .pose-btn:hover{transform:scale(1.08)}

  /* ---------- Find us overlay ---------- */
  .findus-view{position:fixed;inset:0;z-index:80;background:var(--cream);overflow-y:auto;animation:findFade .22s ease}
  @keyframes findFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .findus-view::before{content:"";position:absolute;inset:0;z-index:0;background:radial-gradient(900px 500px at 8% -8%,#FBDFEB 0%,transparent 60%),radial-gradient(800px 420px at 110% 8%,#DCE9FF 0%,transparent 55%);pointer-events:none}
  .findus-header{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:18px 32px;background:transparent}
  .back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;font-family:'Baloo 2';font-weight:800;font-size:14px;background:var(--orange);color:#fff;border:2.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);cursor:pointer;transition:transform .15s,box-shadow .15s}
  .back-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
  [lang="ar"] .back-btn{font-family:'BehanceAr','Cairo',sans-serif;font-size:15px}
  [dir="rtl"] .back-btn{flex-direction:row-reverse}
  .findus-langbtn{background:var(--blue);color:var(--cream);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;border:2.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink);cursor:pointer}
  .findus-body{position:relative;z-index:1}
  @media(max-width:640px){
    .findus-header{padding:12px 16px}
    .back-btn{padding:9px 14px;font-size:13px}
  }

  /* ---------- Location section ---------- */
  .locsec{padding:10px 40px 50px;position:relative;z-index:1;scroll-margin-top:90px}
  .locsec-wrap{max-width:1160px;margin:0 auto}
  .locsec-head{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:24px}
  .locsec-kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;background:var(--pink);color:var(--blue-deep);padding:6px 14px;border-radius:999px;border:2.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink);margin-bottom:14px}
  [lang="ar"] .locsec-kicker{font-family:'Cairo',sans-serif;letter-spacing:0}
  .locsec-title{font-family:'Baloo 2';font-weight:800;font-size:clamp(34px,5vw,56px);line-height:.95;letter-spacing:-2px;color:var(--ink)}
  [lang="ar"] .locsec-title{font-family:'BehanceAr','Cairo',sans-serif;font-size:clamp(28px,4.5vw,46px);letter-spacing:0;line-height:1.15}
  .locsec-title em{font-style:normal;color:var(--orange);background:#fff;border:2.5px solid var(--ink);border-radius:999px;padding:0 18px;box-shadow:4px 4px 0 var(--ink);display:inline-block;transform:rotate(-1deg)}
  [dir="rtl"] .locsec-title em{transform:rotate(1deg)}
  .locsec-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:24px}
  @media(max-width:820px){.locsec-grid{grid-template-columns:1fr}}

  .mapcard{position:relative;background:var(--cream);border:3px solid var(--ink);border-radius:28px;box-shadow:var(--shadow-lg);overflow:hidden;min-height:440px}
  .mapcard svg{display:block;width:100%;height:100%}
  .mapcard-corner{position:absolute;top:14px;left:18px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink);background:#fff;padding:5px 12px;border-radius:999px;border:2px solid var(--ink);z-index:2}
  [dir="rtl"] .mapcard-corner{left:auto;right:18px;font-family:'Cairo',sans-serif;letter-spacing:0}

  .infocard{background:#fff;border:3px solid var(--ink);border-radius:28px;box-shadow:var(--shadow-lg);padding:28px;display:flex;flex-direction:column}
  .info-name{display:flex;align-items:center;gap:14px}
  .info-name::before{content:"";width:14px;height:14px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 6px rgba(232,106,30,.22);flex-shrink:0}
  .info-name-logo{height:50px;width:auto;display:block}
  .info-addr{margin-top:16px;font-size:15px;line-height:1.6;color:var(--ink)}
  .info-addr .city{display:block;font-size:13px;color:#3a436b;margin-top:6px;opacity:.75}
  .info-meta{margin-top:18px;display:flex;flex-direction:column;gap:10px}
  .info-row{display:flex;align-items:center;gap:12px;font-size:14px;color:#1a1f3a}
  .info-row .ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;font-size:15px;border:2px solid var(--ink)}
  .info-row .ic.h{background:var(--pink)}
  .info-row .ic.f{background:#FFE3D6}
  .info-row .ic.p{background:#DCE9FF}
  .info-actions{margin-top:22px;display:flex;flex-direction:column;gap:10px}
  .btn-dir{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 22px;border-radius:999px;font-family:'Baloo 2';font-weight:800;font-size:17px;border:3px solid var(--ink);background:linear-gradient(140deg,var(--orange-light),var(--orange) 55%,var(--orange-deep));color:#fff;box-shadow:6px 6px 0 var(--ink);transition:transform .2s,box-shadow .2s;text-decoration:none}
  .btn-dir:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 var(--ink)}
  [lang="ar"] .btn-dir{font-family:'BehanceAr','Cairo',sans-serif;font-size:18px}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn-mini{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:999px;font-weight:800;font-size:13px;border:2.5px solid var(--ink);background:#fff;color:var(--ink);box-shadow:4px 4px 0 var(--ink);transition:transform .15s,box-shadow .15s;text-decoration:none}
  .btn-mini:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}

  @keyframes loc-pin-pulse{0%{transform:scale(1);opacity:.55}70%{transform:scale(2.6);opacity:0}100%{transform:scale(2.6);opacity:0}}
  @keyframes loc-pin-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .loc-pin-ring{transform-origin:center;animation:loc-pin-pulse 2.2s ease-out infinite}
  .loc-pin-ring-2{transform-origin:center;animation:loc-pin-pulse 2.2s ease-out 1.1s infinite}
  .loc-pin-body{transform-origin:center bottom;animation:loc-pin-bob 3s ease-in-out infinite}

  /* Map life — cars + pedestrians */
  @keyframes corniche-east{from{transform:translateX(-40px)}to{transform:translateX(640px)}}
  @keyframes corniche-west{from{transform:translateX(640px)}to{transform:translateX(-40px)}}
  @keyframes pavement-east{from{transform:translateX(-20px)}to{transform:translateX(620px)}}
  @keyframes pavement-west{from{transform:translateX(620px)}to{transform:translateX(-20px)}}
  @keyframes ped-bob-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.2px)}}
  .car-1{animation:corniche-east 14s linear infinite}
  .car-2{animation:corniche-east 19s linear infinite -7s}
  .car-3{animation:corniche-west 16s linear infinite -3s}
  .ped-1{animation:pavement-east 30s linear infinite}
  .ped-2{animation:pavement-east 38s linear infinite -12s}
  .ped-3{animation:pavement-west 34s linear infinite -5s}
  .ped-4{animation:pavement-west 28s linear infinite -16s}
  .ped-5{animation:pavement-east 32s linear infinite -22s}
  .ped-bob-anim{animation:ped-bob-y 0.5s ease-in-out infinite;transform-origin:center}
  @media (prefers-reduced-motion: reduce){
    .car-1,.car-2,.car-3,.ped-1,.ped-2,.ped-3,.ped-4,.ped-5,.ped-bob-anim{animation:none !important}
  }

  /* ---------- Shop overlay (reuses .findus-view) ---------- */
  .shop-wrap{max-width:1200px;margin:0 auto;padding:8px 24px 80px;position:relative;z-index:1}

  .shop-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;position:sticky;top:60px;z-index:3;background:rgba(251,243,227,.92);backdrop-filter:blur(8px);padding:10px 0;border-radius:14px}

  .shop-sort{padding:10px 14px;border-radius:14px;border:2.5px solid var(--ink);background:#fff;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);box-shadow:3px 3px 0 var(--ink);cursor:pointer}

  .shop-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
  .shop-cats::-webkit-scrollbar{display:none}
  .shop-cat{flex-shrink:0;padding:8px 16px;border-radius:999px;border:2.5px solid var(--ink);background:#fff;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:13px;color:var(--ink);cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .12s,box-shadow .12s;white-space:nowrap}
  [lang="ar"] .shop-cat{font-family:'BehanceAr','Cairo',sans-serif}
  .shop-cat:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
  .shop-cat.active{background:var(--orange);color:#fff}

  .shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:980px){.shop-grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:680px){.shop-grid{grid-template-columns:repeat(2,1fr);gap:10px}}

  .shop-card{position:relative;background:#fff;border:3px solid var(--ink);border-radius:24px;box-shadow:5px 5px 0 var(--ink);overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
  .shop-card:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 var(--ink)}
  .shop-card-img{aspect-ratio:1;background:linear-gradient(140deg,#FBDFEB,#FFE3D6);display:grid;place-items:center;overflow:hidden;border-bottom:3px solid var(--ink)}
  .shop-card-img img{width:100%;height:100%;object-fit:cover}
  .shop-card-img .placeholder{width:60%;height:60%;opacity:.7}
  .shop-card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
  .shop-card-name{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;line-height:1.2;color:var(--ink);min-height:36px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .shop-card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
  .shop-card-price{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:16px;color:var(--orange-deep)}
  [lang="ar"] .shop-card-price{font-family:'BehanceAr','Cairo',sans-serif}
  .shop-card-add{padding:6px 14px;border-radius:999px;border:2px solid var(--ink);background:var(--ink);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:12px;cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .12s}
  [lang="ar"] .shop-card-add{font-family:'BehanceAr','Cairo',sans-serif}
  .shop-card-add:hover{transform:translate(-1px,-1px);background:var(--orange)}
  .shop-card-add[disabled]{opacity:.4;cursor:not-allowed;background:#777}
  .shop-card .featured-pill{position:absolute;top:8px;left:8px;background:#FFD24A;color:#3F2900;border:2px solid var(--ink);border-radius:999px;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;box-shadow:2px 2px 0 var(--ink);z-index:2}
  [dir="rtl"] .shop-card .featured-pill{left:auto;right:8px}
  .shop-card .out-overlay{position:absolute;inset:0;background:rgba(11,16,32,.55);display:grid;place-items:center;color:#fff;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:18px;z-index:1;pointer-events:none}

  /* product sheet (modal) */

  .ps-add{flex:1;padding:13px 22px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;border:2.5px solid var(--ink);background:linear-gradient(140deg,var(--orange-light),var(--orange) 55%,var(--orange-deep));color:#fff;box-shadow:4px 4px 0 var(--ink);cursor:pointer;transition:transform .12s,box-shadow .12s}

  /* sticky cart pill */
  .cart-fab{position:fixed;bottom:20px;right:20px;z-index:55;display:inline-flex;align-items:center;gap:10px;padding:12px 20px;border-radius:999px;background:var(--ink);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;border:2.5px solid var(--ink);box-shadow:5px 5px 0 var(--orange);cursor:pointer;transition:transform .12s,box-shadow .12s}

  /* checkout form */
  .co-wrap{max-width:560px;margin:0 auto}

  .co-summary-total{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:18px;color:var(--orange-deep);padding-top:8px}
  [lang="ar"] .co-summary-total{font-family:'BehanceAr','Cairo',sans-serif}
  .co-submit{width:100%;padding:15px;border-radius:14px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:17px;border:3px solid var(--ink);background:linear-gradient(140deg,var(--orange-light),var(--orange) 55%,var(--orange-deep));color:#fff;box-shadow:6px 6px 0 var(--ink);cursor:pointer;transition:transform .15s,box-shadow .15s}

  /* cart drawer */
  .cart-drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100%);background:var(--cream);border-left:3px solid var(--ink);box-shadow:-8px 0 0 rgba(11,16,32,.15);z-index:90;display:flex;flex-direction:column;animation:cart-slide .22s ease}

  [dir="rtl"] .cart-drawer{animation-name:cart-slide-rtl}
  @keyframes cart-slide-rtl{from{transform:translateX(-100%)}to{transform:translateX(0)}}
  .cart-head{padding:18px 22px;border-bottom:2.5px solid var(--ink);display:flex;justify-content:space-between;align-items:center}

  .cart-line-name{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:13px;color:var(--ink);line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  /* ---------- Loyalty overlay (reuses .findus-view) ---------- */

  .loy-stamps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1;margin-bottom:18px}
  .loy-stamp{aspect-ratio:1;border:2.5px dashed var(--ink);border-radius:18px;display:grid;place-items:center;background:rgba(251,243,227,.4);color:rgba(11,16,32,.25);font-size:24px}
  .loy-stamp.filled{background:linear-gradient(140deg,#F5922E,#E91E63);border-style:solid;color:#fff;box-shadow:3px 3px 0 var(--ink);animation:loy-pop .35s cubic-bezier(.2,1.4,.3,1) both}
  @keyframes loy-pop{0%{transform:scale(.6) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .loy-progress{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#3a436b;font-weight:600;margin-bottom:14px;position:relative;z-index:1}
  .loy-progress strong{font-family:'Baloo 2';font-weight:800;font-size:24px;color:var(--ink);letter-spacing:-1px}

  .loy-rows{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1;margin-bottom:16px}
  .loy-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:rgba(251,243,227,.7);border:2px solid var(--ink);font-size:13px;font-weight:600;color:var(--ink)}

  .loy-reward{background:linear-gradient(140deg,rgba(243,182,206,.7),rgba(232,106,30,.25));border:3px solid var(--ink);border-radius:18px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;position:relative;z-index:1;box-shadow:4px 4px 0 var(--ink);margin-bottom:14px}
  .loy-reward-text{font-family:'Baloo 2';font-weight:800;font-size:15px;line-height:1.15;color:var(--ink)}
  [lang="ar"] .loy-reward-text{font-family:'BehanceAr','Cairo',sans-serif}
  .loy-reward small{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--blue-deep);margin-top:3px;text-transform:uppercase}
  [lang="ar"] .loy-reward small{font-family:'Cairo',sans-serif;letter-spacing:0}
  .loy-reward-btn{padding:10px 16px;border-radius:999px;font-family:'Baloo 2';font-weight:800;font-size:14px;border:2.5px solid var(--ink);background:var(--ink);color:#fff;box-shadow:3px 3px 0 var(--ink);cursor:pointer;flex-shrink:0;transition:transform .15s,box-shadow .15s}
  [lang="ar"] .loy-reward-btn{font-family:'BehanceAr','Cairo',sans-serif}
  .loy-reward-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}

  .loy-mood{display:flex;align-items:center;gap:14px;padding:12px;border-radius:18px;background:#FFF;border:2px dashed var(--ink);position:relative;z-index:1}
  .loy-mood img{width:60px;height:60px;object-fit:contain;flex-shrink:0}
  .loy-mood-text{font-size:13px;color:var(--ink);font-weight:600;line-height:1.3}
  .loy-mood-text strong{font-family:'Baloo 2';font-weight:800;font-size:16px;display:block;line-height:1}
  [lang="ar"] .loy-mood-text strong{font-family:'BehanceAr','Cairo',sans-serif}

  .loy-signout{margin-top:18px;text-align:center}

  /* Nochi-pose stamps */
  .loy-stamps-grid.nochi-stamps.grid-5x2{grid-template-columns:repeat(5,1fr);gap:8px}
  @media(max-width:560px){.loy-stamps-grid.nochi-stamps.grid-5x2{grid-template-columns:repeat(5,1fr);gap:5px}}
  .loy-stamps-grid.nochi-stamps .loy-stamp{padding:6px;background:rgba(251,243,227,.5)}
  .loy-stamps-grid.nochi-stamps .loy-stamp.filled{background:linear-gradient(140deg,#FFD6E0,#FFB07A)}
  .loy-stamp-img{width:100%;height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}
  .loy-stamp-img.empty{filter:grayscale(100%) brightness(.85);opacity:.32}
  .loy-stamp-img.filled{animation:nochi-stamp-bob 3s ease-in-out infinite;filter:drop-shadow(2px 2px 0 rgba(11,16,32,.18))}
  .loy-stamp.filled.cascade-0 .loy-stamp-img.filled{animation-delay:.05s,1s}
  @keyframes nochi-stamp-bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2.5px) rotate(-2deg)}}
  .loy-stamp.filled.cascade-1 .loy-stamp-img.filled{animation-delay:.13s,1.2s}
  .loy-stamp.filled.cascade-2 .loy-stamp-img.filled{animation-delay:.21s,1.4s}
  .loy-stamp.filled.cascade-3 .loy-stamp-img.filled{animation-delay:.29s,1.6s}
  .loy-stamp.filled.cascade-4 .loy-stamp-img.filled{animation-delay:.37s,1.8s}
  .loy-stamp.filled.cascade-5 .loy-stamp-img.filled{animation-delay:.45s,2.0s}
  .loy-stamp.filled.cascade-6 .loy-stamp-img.filled{animation-delay:.53s,2.2s}
  .loy-stamp.filled.cascade-7 .loy-stamp-img.filled{animation-delay:.61s,2.4s}
  .loy-stamp.filled.cascade-8 .loy-stamp-img.filled{animation-delay:.69s,2.6s}

  /* coffee-cup stamp icon (legacy — used on old layouts) */
  .loy-stamp svg{width:62%;height:62%;display:block}
  .loy-stamp{transition:transform .12s ease}
  .loy-stamp:not(.filled){cursor:pointer}
  .loy-stamp.shake{animation:loy-shake .42s ease-in-out}
  @keyframes loy-shake{
    0%,100%{transform:translateX(0) rotate(0)}
    20%{transform:translateX(-3px) rotate(-3deg)}
    40%{transform:translateX(3px) rotate(3deg)}
    60%{transform:translateX(-2px) rotate(-2deg)}
    80%{transform:translateX(2px) rotate(2deg)}
  }
  .loy-cup-body{fill:#fff;stroke:#0B1020;stroke-width:2.5}
  .loy-stamp.filled .loy-cup-body{fill:#fff}
  .loy-cup-coffee{fill:#3A1E0A}
  .loy-cup-handle{fill:none;stroke:#0B1020;stroke-width:2.5}
  .loy-cup-saucer{fill:#0B1020}
  .loy-steam{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;opacity:0;transform-origin:center bottom}
  .loy-stamp.filled .loy-steam{animation:loy-steam 2.4s ease-in-out infinite}
  .loy-stamp.filled .loy-steam.s2{animation-delay:.6s}
  .loy-stamp.filled .loy-steam.s3{animation-delay:1.2s}
  @keyframes loy-steam{
    0%{opacity:0;transform:translateY(2px) scale(.7)}
    30%{opacity:.85}
    100%{opacity:0;transform:translateY(-12px) scale(1.2)}
  }

  /* stamp cascade-in */
  .loy-stamp.filled{animation:loy-pop .42s cubic-bezier(.2,1.6,.3,1) both}
  .loy-stamp.filled.cascade-0{animation-delay:.05s}
  .loy-stamp.filled.cascade-1{animation-delay:.13s}
  .loy-stamp.filled.cascade-2{animation-delay:.21s}
  .loy-stamp.filled.cascade-3{animation-delay:.29s}
  .loy-stamp.filled.cascade-4{animation-delay:.37s}
  .loy-stamp.filled.cascade-5{animation-delay:.45s}
  .loy-stamp.filled.cascade-6{animation-delay:.53s}
  .loy-stamp.filled.cascade-7{animation-delay:.61s}
  .loy-stamp.filled.cascade-8{animation-delay:.69s}

  /* Nochi mascot panel + speech bubble */
  .loy-nochi-panel{display:flex;align-items:center;gap:14px;margin-bottom:18px;position:relative;z-index:1}
  .loy-nochi-img{width:88px;height:88px;flex-shrink:0;animation:loy-nochi-bob 3.4s ease-in-out infinite;filter:drop-shadow(3px 3px 0 rgba(11,16,32,.18))}
  @keyframes loy-nochi-bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(-2deg)}}
  [dir="rtl"] .loy-nochi-img{animation-name:loy-nochi-bob-rtl}
  @keyframes loy-nochi-bob-rtl{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(2deg)}}
  .loy-bubble{position:relative;background:#FFF;border:2.5px solid var(--ink);border-radius:18px;padding:10px 14px;box-shadow:3px 3px 0 var(--ink);font-family:'Baloo 2';font-weight:700;font-size:14px;line-height:1.25;color:var(--ink);max-width:240px}
  [lang="ar"] .loy-bubble{font-family:'BehanceAr','Cairo',sans-serif;font-size:15px}
  .loy-bubble::after{content:"";position:absolute;left:-10px;top:24px;width:14px;height:14px;background:#FFF;border-left:2.5px solid var(--ink);border-bottom:2.5px solid var(--ink);transform:rotate(45deg)}
  [dir="rtl"] .loy-bubble::after{left:auto;right:-10px;border-left:none;border-right:2.5px solid var(--ink);border-bottom:2.5px solid var(--ink);border-top:none;transform:rotate(-45deg)}

  /* birthday banner */
  .loy-bday{background:linear-gradient(140deg,#F3B6CE 0%,#FFD24A 100%);border:3px solid var(--ink);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;box-shadow:4px 4px 0 var(--ink);position:relative;z-index:1;overflow:hidden}
  .loy-bday::before{content:"🎂";font-size:28px;flex-shrink:0}
  .loy-bday-text{font-family:'Baloo 2';font-weight:800;font-size:15px;line-height:1.15;color:var(--ink);position:relative;z-index:2}
  [lang="ar"] .loy-bday-text{font-family:'BehanceAr','Cairo',sans-serif}
  .loy-bday small{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--blue-deep);margin-top:3px;text-transform:uppercase}
  [lang="ar"] .loy-bday small{font-family:'Cairo',sans-serif;letter-spacing:0}

  /* streak fire */
  .loy-row.streaking .ic{background:linear-gradient(140deg,#FFD24A,#E86A1E);animation:loy-fire 1.4s ease-in-out infinite}
  @keyframes loy-fire{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.08) rotate(-3deg)}75%{transform:scale(1.08) rotate(3deg)}}

  /* tier-up celebration */
  .loy-tierup{background:linear-gradient(140deg,#A07AFF,#F3B6CE,#4A84FF);background-size:200% 200%;animation:loy-shimmer 3s ease-in-out infinite;border:3px solid var(--ink);border-radius:18px;padding:14px 16px;color:#fff;text-align:center;margin-bottom:14px;box-shadow:5px 5px 0 var(--ink);position:relative;z-index:1;overflow:hidden}
  @keyframes loy-shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .loy-tierup-text{font-family:'Baloo 2';font-weight:800;font-size:18px;line-height:1.1}
  [lang="ar"] .loy-tierup-text{font-family:'BehanceAr','Cairo',sans-serif}
  .loy-tierup small{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;font-weight:700;margin-top:3px;text-transform:uppercase;opacity:.9}
  [lang="ar"] .loy-tierup small{font-family:'Cairo',sans-serif;letter-spacing:0}

  /* hops counter row */
  .loy-row.hops .ic{background:#E86A1E;color:#fff}
  .loy-hops-trail{display:inline-flex;gap:3px;margin-left:8px}
  [dir="rtl"] .loy-hops-trail{margin-left:0;margin-right:8px}
  .loy-hops-trail span{display:inline-block;width:8px;height:8px;background:rgba(232,106,30,.6);border-radius:50%;animation:loy-hop .8s ease-in-out infinite}
  .loy-hops-trail span:nth-child(2){animation-delay:.13s}
  .loy-hops-trail span:nth-child(3){animation-delay:.26s}
  @keyframes loy-hop{0%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-4px);opacity:1}}

  /* daily flavor copy */
  .loy-flavor{margin-top:14px;padding:10px 14px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:#485070;font-style:italic;font-weight:600;border-top:2px dashed rgba(11,16,32,.18);position:relative;z-index:1}
  [lang="ar"] .loy-flavor{font-family:'Cairo',sans-serif;letter-spacing:0;font-style:normal}

  /* confetti burst */
  .loy-confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:6}
  .loy-confetti span{position:absolute;left:50%;top:30%;width:8px;height:14px;border-radius:2px;background:var(--c);animation:loy-confetti 1.6s cubic-bezier(.2,.6,.2,1) var(--d) both;transform-origin:center}
  @keyframes loy-confetti{
    0%{transform:translate(-50%,-50%) rotate(0);opacity:1}
    20%{opacity:1}
    100%{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot));opacity:0}
  }

  /* loading Nochi */
  .loy-loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px}
  .loy-loading img{width:96px;height:96px;animation:loy-loading-bounce .6s ease-in-out infinite alternate;filter:drop-shadow(3px 3px 0 rgba(11,16,32,.15))}

  .loy-loading-text{font-family:'Baloo 2';font-weight:800;font-size:16px;color:var(--ink)}

  /* signup teaser */

  [lang="ar"] .loy-bday-teaser strong{font-family:'BehanceAr','Cairo',sans-serif}

  /* drink picker */
  .loy-drink-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 14px}

  .loy-drink-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 8px;border-radius:18px;background:#fff;border:2.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);cursor:pointer;font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--ink);transition:transform .15s,box-shadow .15s;min-height:88px}

  .loy-token-card{background:#fff;border:3px solid var(--ink);border-radius:28px;box-shadow:var(--shadow-lg);padding:32px 24px;text-align:center;position:relative;overflow:hidden}

  @keyframes loy-steam-big{0%{opacity:0;transform:translateY(6px) scale(.8)}30%{opacity:1}100%{opacity:0;transform:translateY(-22px) scale(1.3)}}
  .loy-token{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:42px;letter-spacing:6px;color:var(--ink);background:var(--cream);border:3px dashed var(--ink);border-radius:18px;padding:24px;display:inline-block;margin:14px 0;line-height:1}

  @media(max-width:640px){

  .bp-row-text{flex:1;min-width:0}

  .bp-row-sub{font-size:13px;color:#3a436b;margin-top:3px;opacity:.8}
  .bp-row-arrow{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(--orange);color:#fff;display:grid;place-items:center;font-size:16px;font-weight:800}
  .bp-soon{flex-shrink:0;padding:5px 12px;border-radius:999px;border:2px solid var(--ink);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;background:var(--pink)}

    .bp-overlay{align-items:flex-end;padding:0}

    .bp-row{padding:14px 14px;min-height:64px}
    .bp-row-name{font-size:16px}
  }

function relativeDays(iso, lt){
  if(!iso) return lt.neverVisited;
  const d = new Date(iso);
  const now = new Date();
  const ms  = now - d;
  const days = Math.floor(ms / (1000*60*60*24));
  if(days <= 0) return lt.today;
  if(days === 1) return lt.yesterday;
  return days + ' ' + lt.daysAgo;
}

  const [cart, setCart]         = useState(()=>{
    try { return JSON.parse(localStorage.getItem('noch-shop-cart') || '[]'); }
    catch(e){ return []; }
  });
  const [busy, setBusy]         = useState(false);
  const [error, setError]       = useState('');
  const [result, setResult]     = useState(null);

  useEffect(()=>{
    try { localStorage.setItem('noch-shop-cart', JSON.stringify(cart)); } catch(e){}
  }, [cart]);

  useEffect(()=>{
    if (!sb) return;
    Promise.all([
      sb.from('pos_products').select('id,name,name_ar,price,description,menu_description,menu_description_ar,image_url,is_active,visible_on_website,track_inventory,stock_qty,featured,category_id,created_at')
        .eq('visible_on_website', true).eq('is_active', true).order('featured', {ascending:false}).order('name'),
      sb.from('pos_categories').select('id,name,name_ar').order('name'),
    ]).then(([pr, cr]) => {
      setProducts(pr.data || []);
      setCats(cr.data || []);
    });
  }, []);

  function addToCart(product, qty=1){
    setCart(c => {
      const existing = c.find(x => x.product_id === product.id);
      if (existing) return c.map(x => x.product_id === product.id ? {...x, qty: x.qty + qty} : x);
      return [...c, { product_id: product.id, qty }];
    });
    setCartOpen(true);
  }

  function setQty(product_id, qty){
    if (qty <= 0) { setCart(c => c.filter(x => x.product_id !== product_id)); return; }
    setCart(c => c.map(x => x.product_id === product_id ? {...x, qty} : x));
  }

  function removeFromCart(product_id){
    setCart(c => c.filter(x => x.product_id !== product_id));
  }

  async function placeOrder(payload){
    if (!sb) return;
    setBusy(true); setError('');
    try {
      const { data, error: e } = await sb.rpc('place_shop_order', { p_payload: payload });
      if (e) throw e;
      setResult(data);
      setCart([]); // clear cart on success
      setView('confirmation');
    } catch(e) {
      console.warn('place_shop_order failed', e);
      setError((e && e.message) || 'Order failed. Try again?');
    } finally { setBusy(false); }
  }

  // Filter/search/sort
  const filtered = products.filter(p => {
    if (activeCat !== 'all' && p.category_id !== activeCat) return false;
    if (search.trim()) {
      const s = search.trim().toLowerCase();
      const hay = ((p.name||'') + ' ' + (p.name_ar||'') + ' ' + (p.description||'') + ' ' + (p.menu_description||'')).toLowerCase();
      if (!hay.includes(s)) return false;
    }
    return true;
  });
  const sorted = [...filtered].sort((a,b)=>{
    if (sort === 'priceAsc')  return Number(a.price) - Number(b.price);
    if (sort === 'priceDesc') return Number(b.price) - Number(a.price);
    if (sort === 'new')       return new Date(b.created_at) - new Date(a.created_at);
    // featured: featured first, then alpha
    if (a.featured !== b.featured) return a.featured ? -1 : 1;
    return (a.name||'').localeCompare(b.name||'');
  });
  const cartCount = cart.reduce((s,x)=>s+x.qty, 0);
  const cartSubtotal = cart.reduce((s,x)=>{
    const p = products.find(pp => pp.id === x.product_id);
    return s + (p ? Number(p.price) * x.qty : 0);
  }, 0);

  return (
    <div className="findus-view" role="dialog" aria-modal="true">
      <div className="findus-header">
        <button type="button" className="back-btn" onClick={onClose} aria-label={lang==='ar'?'العودة':'Back'}>
          {lang==='ar' ? <React.Fragment><span>العودة</span> →</React.Fragment> : <React.Fragment>← <span>Back</span></React.Fragment>}
        </button>
        <button type="button" className="findus-langbtn" onClick={()=>setLang(lang==='en'?'ar':'en')}>
          {lang==='en'?'ع':'EN'}
        </button>
      </div>

      <div className="shop-wrap">
        {view === 'browse' && (
          <React.Fragment>
            <div className="shop-head">
              <span className="shop-kicker">{lt.shopKicker}</span>
              <h2 className="shop-title">{lt.shopTitle1} <em>{lt.shopTitle2}</em></h2>
              <p className="shop-sub">{lt.shopSub}</p>

                <option value="priceDesc">{lt.sortPriceDesc}</option>

                        className={'shop-cat' + (activeCat===c.id?' active':'')}

            <div className="shop-grid">
              {sorted.map(p => (
                <ShopProductCard key={p.id} product={p} lang={lang} lt={lt}

            </div>
            {sorted.length === 0 && (
              <div style={{textAlign:'center',color:'#3a436b',padding:'40px 0'}}>
                {lang==='ar' ? 'ما لقينا شي.' : 'Nothing found.'}

        )}

        {view === 'checkout' && (
          <ShopCheckout cart={cart} products={products} lang={lang} lt={lt}
                        busy={busy} error={error}
                        onSubmit={placeOrder}
                        onCancel={()=>setView('browse')}/>
        )}

        {view === 'confirmation' && result && (
          <ShopConfirmation result={result} lang={lang} lt={lt}
                            onClose={()=>{ setResult(null); setView('browse'); onClose(); }}/>
        )}
      </div>

      {/* sticky cart pill (only in browse view, only when cart has items) */}
      {view === 'browse' && cartCount > 0 && (
        <button type="button" className="cart-fab" onClick={()=>setCartOpen(true)}>
          <span>🛒</span>
          <span className="badge">{cartCount}</span>
          <span dir="ltr">{cartSubtotal.toFixed(0)} LYD</span>
        </button>
      )}

      <ProductSheet product={openProduct} lang={lang} lt={lt}
                    onClose={()=>setOpenP(null)} onAdd={addToCart}/>

      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)}
                  cart={cart} products={products} lang={lang} lt={lt}
                  onQty={setQty} onRemove={removeFromCart}
                  onCheckout={()=>{ setCartOpen(false); setView('checkout'); }}/>
    </div>
  );
}

function ConfettiBurst({ show }){
  const COLORS = ['#E86A1E','#1E3A9F','#F3B6CE','#FFD24A','#7BA845','#A07AFF'];
  if (!show) return null;
  const bits = Array.from({length: 28}).map((_, i) => {
    const dx = (Math.random() * 600 - 300);
    const dy = (Math.random() * 360 + 80);
    const rot = (Math.random() * 720 - 360);
    const delay = (Math.random() * 0.25);
    return (
      <span key={i} style={{
        '--c':   COLORS[i % COLORS.length],
        '--dx':  dx + 'px',
        '--dy':  dy + 'px',
        '--rot': rot + 'deg',
        '--d':   delay + 's',
      }}/>
    );
  });
  return <div className="loy-confetti" aria-hidden="true">{bits}</div>;
}

function pickSpeech(state, lt){
  const lines = (lt.nochiSpeech && lt.nochiSpeech[(state||'happy').toLowerCase()]) || (lt.nochiSpeech && lt.nochiSpeech.happy) || [];
  if (!lines.length) return moodLabel(state, lt);
  // Date-seeded pick so it stays stable through a session-day
  const d = new Date();
  const seed = d.getFullYear()*1000 + d.getMonth()*40 + d.getDate();
  return lines[seed % lines.length];
}

function pickFlavor(lt, customer){
  const list = lt.flavor || [];
  if (!list.length) return '';
  const d = new Date();
  const seed = d.getFullYear()*1000 + d.getMonth()*40 + d.getDate();
  const line = list[seed % list.length];
  return line.replace('{N}', customer?.total_stamps || 0);
}

function isBirthdayToday(birthday){
  if (!birthday) return false;
  const b = new Date(birthday + 'T00:00:00');
  if (isNaN(b.getTime())) return false;
  const t = new Date();
  return b.getMonth() === t.getMonth() && b.getDate() === t.getDate();
}

function tierRank(t){
  switch((t||'bronze').toLowerCase()){
    case 'silver': return 1;
    case 'gold':   return 2;
    case 'legend': return 3;
    default:       return 0;
  }
}

const MONTH_NAMES = {
  en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
  ar: ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],
};
const DRINKS = [
  { id: 'hot_coffee',  emoji: '☕',  en: 'Hot coffee',  ar: 'قهوة ساخنة' },
  { id: 'iced_coffee', emoji: '🧊',  en: 'Iced coffee', ar: 'قهوة مثلجة' },
  { id: 'hot_matcha',  emoji: '🍵',  en: 'Hot matcha',  ar: 'ماتشا ساخنة' },

}

function BdayDayMonthPicker({ value, onChange, lang, lt }){
  // Parse incoming ISO YYYY-MM-DD if present
  let curDay = '';
  let curMonth = '';
  if (value && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
    const parts = value.split('-');
    curMonth = parts[1];
    curDay   = parts[2];
  }
  function emit(d, m){
    if (d && m) onChange('2000-' + m + '-' + d);
    else onChange('');
  }
  const days = Array.from({length:31}, (_, i)=>String(i+1).padStart(2,'0'));
  const months = MONTH_NAMES[lang] || MONTH_NAMES.en;
  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:8}}>
      <select className="loy-input" value={curDay}
              onChange={(e)=>{ const d=e.target.value; emit(d, curMonth); }}>
        <option value="">{lang==='ar' ? 'يوم' : 'Day'}</option>
        {days.map(d => <option key={d} value={d}>{Number(d)}</option>)}
      </select>
      <select className="loy-input" value={curMonth}
              onChange={(e)=>{ const m=e.target.value; emit(curDay, m); }}>
        <option value="">{lang==='ar' ? 'شهر' : 'Month'}</option>
        {months.map((name, i)=>{
          const m = String(i+1).padStart(2,'0');
          return <option key={m} value={m}>{name}</option>;
        })}
      </select>
    </div>
  );
}

function LoyaltyOverlay({ lang, setLang, lt, onClose }){
  const [step, setStep]            = useState('phone'); // phone | signup | enable_wa | card | drink_pick | redeem
  const [phone, setPhone]          = useState('');
  const [name, setName]            = useState('');
  const [birthday, setBday]        = useState('');
  const [card, setCard]            = useState(null);
  const [redeem, setRedeem]        = useState(null);
  const [pendingRewardId, setPRId] = useState(null);
  const [error, setError]          = useState('');
  const [busy, setBusy]            = useState(false);
  const [shaken, setShaken]        = useState(-1);
  function shakeStamp(i){
    setShaken(i);
    setTimeout(()=>setShaken(-1), 450);
  }

  // Auto-load card if phone was remembered from a previous session
  useEffect(()=>{
    try{
      const remembered = localStorage.getItem('noch-loy-phone');
      if (remembered) {
        setPhone(remembered);
        loadCard(remembered);
      }
    }catch(e){}
  // eslint-disable-next-line
  }, []);

  function normalizePhone(p){
    let s = (p || '').trim();
    if (!s) return '';
    if (s.startsWith('+')) return s;
    if (s.startsWith('00')) return '+' + s.slice(2);
    const digits = s.replace(/\D/g, '');
    if (digits.length === 9 && digits.startsWith('0')) return '+218' + digits.slice(1);
    if (digits.length === 9) return '+218' + digits;
    if (digits.length === 12 && digits.startsWith('218')) return '+' + digits;
    return '+' + digits;
  }

  async function loadCard(p){
    if (!sb) { setError(lt.err_network); return; }
    setBusy(true); setError('');
    try{
      const { data, error: rpcErr } = await sb.rpc('get_my_loyalty_card', { p_phone: p });
      if (rpcErr) throw rpcErr;
      if (!data || !data.customer) {
        setStep('signup');
      } else {
        setCard(data);
        setStep('card');
        try { localStorage.setItem('noch-loy-phone', p); } catch(e){}
      }
    } catch(e){
      console.warn('loadCard failed', e);
      setError(lt.err_network);
    } finally { setBusy(false); }
  }

  async function submitPhone(){
    if (!phone.trim()) return;
    const p = normalizePhone(phone);
    setPhone(p);
    await loadCard(p);
  }

  async function doSignup(){
    if (!sb || !name.trim()) return;
    setBusy(true); setError('');
    try{
      const p = normalizePhone(phone);
      const { error: e } = await sb.rpc('signup_loyalty_customer', {
        p_phone: p, p_full_name: name.trim(),
        p_birthday: birthday || null
      });
      if (e) throw e;
      try { localStorage.setItem('noch-loy-phone', p); } catch(_){}
      setPhone(p);
      // Send them to the WhatsApp opt-in step before showing the card.
      setStep('enable_wa');
    } catch(e){
      console.warn('signup failed', e);
      setError(lt.err_network);
    } finally { setBusy(false); }
  }

  async function enableWhatsApp(){
    try { localStorage.setItem('noch-loy-wa', '1'); } catch(_){}
    if (sb) {
      try {
        await sb.rpc('loyalty_send_welcome', { p_phone: phone });
      } catch(e) {
        console.warn('welcome queue failed', e);
      }
    }
    // Don't block: navigate to card after a short delay so the wa.me tab can open
    setTimeout(()=>{ setStep('card'); loadCard(phone); }, 500);
  }

  function startRedeem(rewardId){
    setPRId(rewardId);
    setStep('drink_pick');
  }

  async function confirmDrink(drinkId){
    if (!sb || !pendingRewardId) return;
    setBusy(true); setError('');
    try{
      const { data, error: e } = await sb.rpc('redeem_my_reward', {
        p_phone:     phone,
        p_reward_id: pendingRewardId,
        p_drink:     drinkId,
      });
      if (e) throw e;
      setRedeem(data);
      setStep('redeem');
    } catch(e){
      console.warn('redeem failed', e);
      setError(lt.err_network);
    } finally { setBusy(false); }
  }

  function signOut(){
    try { localStorage.removeItem('noch-loy-phone'); } catch(e){}
    setCard(null); setRedeem(null); setPhone(''); setName(''); setBday(''); setStep('phone');
  }

  const customer = card?.customer;
  const stampGoal = card?.settings?.stamp_goal || 9;
  const current = customer?.current_stamps || 0;

  return (
    <div className="findus-view" role="dialog" aria-modal="true">
      <div className="findus-header">
        <button type="button" className="back-btn" onClick={onClose} aria-label={lang==='ar'?'العودة':'Back'}>
          {lang==='ar' ? <React.Fragment><span>العودة</span> →</React.Fragment> : <React.Fragment>← <span>Back</span></React.Fragment>}
        </button>
        <button type="button" className="findus-langbtn" onClick={()=>setLang(lang==='en'?'ar':'en')}>
          {lang==='en'?'ع':'EN'}
        </button>
      </div>
      <div className="loy-wrap">
        <div className="loy-head">
          <span className="loy-kicker">{lt.kicker}</span>
          <h2 className="loy-title">{lt.t1} <em style={{fontStyle:'normal',color:'var(--orange)'}}>{lt.t2}</em></h2>
          {step === 'phone' && <p className="loy-sub">{lt.sub}</p>}
        </div>

        {error && <div className="loy-err" style={{marginBottom:12}}>{error}</div>}

        {busy && step !== 'card' && step !== 'redeem' && (
          <div className="loy-loading">
            <img src="assets/nochi-walking.png" alt=""/>
            <div className="loy-loading-text">
              {step === 'phone'      ? lt.loadingFinding :
               step === 'enable_wa'  ? lt.loadingSending :
               step === 'signup'     ? lt.loadingSigning :

          </div>
        )}

          <form className="loy-form" onSubmit={(e)=>{e.preventDefault(); submitPhone();}}>
            <label className="loy-label" htmlFor="loy-phone">{lt.phoneLabel}</label>
            <input id="loy-phone" className="loy-input" type="tel" placeholder={lt.phonePh}

            <button type="submit" className="loy-cta" disabled={busy || !phone.trim()}>
              {busy ? lt.sending : lt.continue}
            </button>
          </form>
        )}

        {step === 'enable_wa' && !busy && (
          <EnableWhatsApp phone={phone} lt={lt} lang={lang}
                          onEnable={enableWhatsApp}
                          onSkip={()=>{ setStep('card'); loadCard(phone); }}/>
        )}

        {step === 'signup' && !busy && (
          <form className="loy-form" onSubmit={(e)=>{e.preventDefault(); doSignup();}}>
            <div>
              <h3 style={{fontFamily:lang==='ar'?"'BehanceAr','Cairo',sans-serif":"'Baloo 2',sans-serif",fontWeight:800,fontSize:22,marginBottom:4,color:'var(--ink)'}}>{lt.welcome}</h3>
              <p className="loy-sub" style={{margin:0}}>{lt.welcomeSub}</p>
            </div>
            <label className="loy-label" htmlFor="loy-name">{lt.nameLabel}</label>
            <input id="loy-name" className="loy-input" type="text" placeholder={lt.namePh}
                   value={name} onChange={(e)=>setName(e.target.value)} autoFocus/>
            <label className="loy-label">{lt.bdayLabel}</label>
            <BdayDayMonthPicker value={birthday} onChange={setBday} lang={lang} lt={lt}/>
            <div className="loy-bday-teaser">
              <strong>{lt.sigGiftTitle}</strong>
              {lt.sigGiftBody}
            </div>
            <button type="submit" className="loy-cta" disabled={busy || !name.trim()}>
              {busy ? lt.loadingSigning : lt.startCard}
            </button>
          </form>
        )}

        {step === 'card' && customer && (
          <CardView
            customer={customer}
            card={card}
            stampGoal={stampGoal}
            current={current}
            shaken={shaken}
            onShake={shakeStamp}
            onRedeem={(rid)=>startRedeem(rid)}
            onSignOut={signOut}
            busy={busy}
            lang={lang}
            lt={lt}
          />
        )}

        {step === 'drink_pick' && !busy && (
          <div className="loy-form" style={{position:'relative'}}>
            <div style={{textAlign:'center',marginBottom:8}}>
              <h3 style={{fontFamily:lang==='ar'?"'BehanceAr','Cairo',sans-serif":"'Baloo 2',sans-serif",fontWeight:800,fontSize:24,color:'var(--ink)',lineHeight:1.05}}>{lt.drinkPickTitle}</h3>
              <p className="loy-sub" style={{margin:'4px auto 0',maxWidth:360}}>{lt.drinkPickSub}</p>
            </div>
            <div className="loy-drink-grid">
              {DRINKS.map(d => (
                <button key={d.id} type="button" className="loy-drink-btn" onClick={()=>confirmDrink(d.id)}>
                  <span className="loy-drink-emoji">{d.emoji}</span>
                  <span className="loy-drink-label">{lang==='ar' ? d.ar : d.en}</span>
                </button>
              ))}
            </div>
            <button type="button" className="loy-link" onClick={()=>{ setPRId(null); setStep('card'); }}
                    style={{marginTop:6}}>
              {lang==='ar' ? '← ارجع للبطاقة' : '← Back to card'}
            </button>
          </div>
        )}

        {step === 'redeem' && redeem && (
          <div className="loy-token-card">
            <ConfettiBurst show={true}/>
            <div className="loy-bigcup"><BigCoffeeCup/></div>
            {redeem.drink_choice && (
              <div className="loy-drink-chip">
                {(DRINKS.find(d=>d.id===redeem.drink_choice)?.emoji) || '🥤'}
                {' '}
                {drinkLabel(redeem.drink_choice, lang)}
              </div>
            )}
            <div className="loy-label">{lt.redeemTitle}</div>
            <div className="loy-token" dir="ltr">{redeem.token}</div>
            <p className="loy-token-help">{lt.redeemCupHelp || lt.redeemHelp}</p>
            <RedeemCountdown expiresAt={redeem.expires_at} lt={lt}/>
            <div style={{marginTop:18}}>
              <button type="button" className="loy-link" onClick={()=>{ setRedeem(null); setStep('card'); }}>{lt.backToCard}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function RedeemCountdown({ expiresAt, lt }){
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{
    const t = setInterval(()=>setNow(Date.now()), 500);
    return ()=>clearInterval(t);
  }, []);
  const ms = new Date(expiresAt).getTime() - now;
  if (ms <= 0) return <div className="loy-countdown">⏱ 0:00</div>;
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms % 60000)/1000);
  return <div className="loy-countdown">⏱ {lt.expiresIn} {m}:{String(s).padStart(2,'0')}</div>;
}

function TweaksPanel({ slots, setSlots, open, setOpen, allPoses, onUpload, onClear, pos, onNudge, sizes, onResize }){
  const patch = (sid, pk)=>{
    const next = {...slots, [sid]: pk};
    setSlots(next);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits: next}, "*");
  };
  const fr = useRef(null);
  return (
    <div className={`tweaks-panel ${open?"open":""}`} dir="ltr" lang="en">
      <div className="tweaks-header">
        <h4>Tweaks</h4>
        <button className="tweaks-close" onClick={()=>setOpen(false)}>✕</button>
      </div>
      <div className="tweaks-body">
        <div className="tweak-group">
          <label>Upload new Nochi pose</label>
          <input ref={fr} type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={(e)=>{Array.from(e.target.files).forEach(f=>onUpload(f));e.target.value="";}}/>
          <button onClick={()=>fr.current?.click()}
            style={{padding:"10px 18px",borderRadius:999,border:"2px solid var(--ink)",background:"var(--cream)",fontWeight:800,fontSize:13,cursor:"pointer",boxShadow:"3px 3px 0 var(--ink)",fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}>
            📁 Upload image(s)
          </button>
          {allPoses.filter(p=>p.custom).length > 0 && (
            <div style={{marginTop:10}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                {allPoses.filter(p=>p.custom).map(p=>(
                  <div key={p.key} className="pose-btn" title={p.label}><img src={p.src} alt={p.label}/></div>
                ))}
              </div>
              <button onClick={onClear}
                style={{padding:"7px 14px",borderRadius:999,border:"2px solid var(--orange)",background:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",color:"var(--orange)",fontFamily:"inherit"}}>
                🗑 Clear uploaded poses
              </button>
            </div>
          )}
        </div>
        <div className="tweak-group">
          <label>Nudge &amp; resize mascots</label>
          {['menu','find','deliver','store','loyalty'].map(sid=>{
            const p = pos[sid]||{x:0,y:0};
            const sz = sizes[sid]||260;
            const btnS = {width:28,height:28,border:"2px solid var(--ink)",borderRadius:6,background:"var(--cream)",fontWeight:800,fontSize:13,cursor:"pointer",display:"grid",placeItems:"center"};
            return (
              <div key={sid} style={{marginBottom:14}}>
                <div className="tweak-slot-label">{SLOTS.find(s=>s.id===sid)?.label} <span style={{opacity:.5,fontWeight:400,fontSize:11}}>x:{p.x} y:{p.y} · {sz}px</span></div>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,28px)",gap:4}}>
                    <div/><button style={btnS} onClick={()=>onNudge(sid,'y',-10)}>↑</button><div/>
                    <button style={btnS} onClick={()=>onNudge(sid,'x',-10)}>←</button>
                    <button style={{...btnS,fontSize:9,background:"#eee"}} onClick={()=>onNudge(sid,'_reset')}>●</button>
                    <button style={btnS} onClick={()=>onNudge(sid,'x',10)}>→</button>
                    <div/><button style={btnS} onClick={()=>onNudge(sid,'y',10)}>↓</button><div/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                    <button style={btnS} onClick={()=>onResize(sid,20)}>＋</button>
                    <span style={{fontSize:10,fontFamily:"monospace",opacity:.6}}>{sz}</span>
                    <button style={btnS} onClick={()=>onResize(sid,-20)}>－</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="tweak-group">
          <label>Nochi pose per slot</label>
          {SLOTS.map(s=>(
            <div key={s.id} style={{marginBottom:14}}>
              <div className="tweak-slot-label">{s.label}</div>
              <div className="tweak-slot">
                {allPoses.map(p=>(
                  <button key={p.key} className={`pose-btn ${slots[s.id]===p.key?"active":""}`}
                    onClick={()=>patch(s.id, p.key)} title={p.label}>
                    <img src={p.src} alt={p.label}/>
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [lang, setLang] = useState(()=>localStorage.getItem("noch-lang")||"ar");
const [slots, setSlots] = useState(TWEAK_DEFAULTS);
  const [pos, setPos] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('noch-pos-v2')||'null') || POS_DEFAULTS; }catch(e){return POS_DEFAULTS;}
  });
  const [sizes, setSizes] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('noch-sizes-v2')||'null') || SIZE_DEFAULTS; }catch(e){return SIZE_DEFAULTS;}
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [findOpen, setFindOpen] = useState(()=>{
    return typeof window !== 'undefined' && window.location.hash === '#find';
  });
  const [loyaltyOpen, setLoyaltyOpen] = useState(()=>{
    return typeof window !== 'undefined' && window.location.hash === '#loyalty';
  });
  const [shopOpen, setShopOpen] = useState(()=>{
    return typeof window !== 'undefined' && window.location.hash === '#shop';
  });
  useEffect(()=>{
    const desired = findOpen ? '#find' : (loyaltyOpen ? '#loyalty' : (shopOpen ? '#shop' : ''));
    if (desired) {
      if (window.location.hash !== desired) window.history.pushState(null, '', desired);
      document.body.style.overflow = 'hidden';
    } else {
      if (['#find','#loyalty','#shop'].includes(window.location.hash)) {
        window.history.replaceState(null, '', window.location.pathname);
      }
      document.body.style.overflow = '';
    }
    return ()=>{ document.body.style.overflow = ''; };
  }, [findOpen, loyaltyOpen, shopOpen]);
  useEffect(()=>{
    const onPop = ()=>{
      setFindOpen(window.location.hash === '#find');
      setLoyaltyOpen(window.location.hash === '#loyalty');
      setShopOpen(window.location.hash === '#shop');
    };
    window.addEventListener('popstate', onPop);
    return ()=>window.removeEventListener('popstate', onPop);
  }, []);
  const [customPoses, setCustomPoses] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('noch-custom-poses')||'[]'); }catch(e){return [];}
  });
  const allPoses = [...POSES, ...customPoses];
  const t = STR[lang];

  const addCustomPose = (file)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 800; // higher quality
        const scale = Math.min(MAX/img.width, MAX/img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // Try high quality first, fall back to lower if localStorage full
        const tryStore = (quality) => {
          const dataUrl = canvas.toDataURL('image/png', quality);
          const key = "custom_" + Date.now();
          const np = { key, src: dataUrl, label: file.name.replace(/\.[^.]+$/,''), custom: true };
          setCustomPoses(prev=>{
            const next = [...prev, np];
            try {
              localStorage.setItem('noch-custom-poses', JSON.stringify(next));
              return next;
            } catch(err) {
              if (quality > 0.4) {
                // retry with lower quality
                tryStore(quality - 0.2);
                return prev;
              }
              console.warn('localStorage full, session-only');
              return next;
            }
          });
        };
        tryStore(0.95);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const nudge = (slotId, axis, delta)=>{
    if(axis === '_reset'){
      setPos(prev=>{ const next={...prev,[slotId]:{x:0,y:0}}; localStorage.setItem('noch-pos-v2',JSON.stringify(next)); return next; });
      return;
    }
    setPos(prev=>{
      const next = {...prev, [slotId]: {...(prev[slotId]||{x:0,y:0}), [axis]: ((prev[slotId]||{x:0,y:0})[axis]||0) + delta}};
      localStorage.setItem('noch-pos-v2', JSON.stringify(next));
      return next;
    });
  };

  const getMascotStyle = (slotId)=>{
    const p = pos[slotId]||{x:0,y:0};
    const s = sizes[slotId]||260;
    return { transform: `translate(${p.x}px, ${p.y}px)`, width:s, height:s };
  };

  const resizeMascot = (slotId, delta)=>{
    setSizes(prev=>{
      const next = {...prev, [slotId]: Math.max(80, Math.min(400, (prev[slotId]||260) + delta))};
      localStorage.setItem('noch-sizes-v2', JSON.stringify(next));
      return next;
    });
  };

  const clearCustomPoses = ()=>{
    setCustomPoses([]);
    localStorage.removeItem('noch-custom-poses');
    const cleaned = {};
    Object.keys(slots).forEach(k=>{
      cleaned[k] = slots[k].startsWith('custom_') ? 'master' : slots[k];
    });
    setSlots(cleaned);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits: cleaned}, "*");
  };

  useEffect(()=>{
    localStorage.setItem("noch-lang", lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang==="ar"?"rtl":"ltr";
  },[lang]);

  useEffect(()=>{
    const onMsg = (e)=>{
      if(!e.data) return;
      if(e.data.type==="__activate_edit_mode") setTweaksOpen(true);
      if(e.data.type==="__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", onMsg);
  }, []);

  return (
    <React.Fragment>
      <section className="hero">
        <div className="nav-bar">
          <nav className="nav">
            <a href="#"><img className="nav-logo" src="assets/noch-logo.png" alt="Noch" style={{height:72,width:"auto",marginTop:-18,marginBottom:-18}}/></a>
            <div className="nav-links">
              <a href="#big3">{t.navMenu}</a>
              <a href="#find" onClick={(e)=>{e.preventDefault();setFindOpen(true);}}>{t.navFind}</a>
              <a href="#shop" onClick={(e)=>{e.preventDefault();setShopOpen(true);}}>{t.navStore}</a>
              <a href="#loyalty" onClick={(e)=>{e.preventDefault();setLoyaltyOpen(true);}}>{t.navLoyalty}</a>
            </div>
            <div className="nav-right">
              <a href="https://apps.noch.cloud" target="_blank" rel="noopener" className="staff-lnk">{t.staff}</a>
              <button className="lang-btn" onClick={()=>setLang(lang==="en"?"ar":"en")}>
                {lang==="en"?"ع":"EN"}
              </button>
            </div>
          </nav>
        </div>

        <div className="hero-content">
          <div className="hero-layout">
            <div>
              <div className="nochi-pill">
                <img src={gp(slots.pill, allPoses)} alt=""/> {t.pill}
              </div>
              <h1>
                {t.h1a}<br/>
                {t.h1b} <span className="orange-pill">{t.h1c}</span>
              </h1>
              <p className="hero-sub">{t.sub}</p>
              <div className="hero-ctas">
                <a className="btn primary" href="#big3">{t.ctaMenu}</a>
                <a className="btn secondary" href="#find" onClick={(e)=>{e.preventDefault();setFindOpen(true);}}>{t.ctaFind}</a>
              </div>
            </div>
            <img className="hero-mascot" src={gp(slots.hero, allPoses)} alt="Nochi"/>
          </div>
        </div>
      </section>

      <section className="big3-section" id="big3">
        <div className="big3-wrap">
          <div className="big3">
            <button type="button" className="tile" onClick={()=>setPickerOpen(true)}>
              <div className="tile-kicker">{t.menuK}</div>
              <div className="tile-title">{t.menuT}</div>
              <div className="tile-desc">{t.menuD}</div>
              <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
              <img className="tile-mascot shift-bottom" src={gp(slots.menu, allPoses)} alt="" style={getMascotStyle('menu')}/>
            </button>
            <button type="button" className="tile" onClick={()=>setFindOpen(true)}>
              <div className="tile-kicker">{t.findK}</div>
              <div className="tile-title">{t.findT}</div>
              <div className="tile-desc">{t.findD}</div>
              <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
              <img className="tile-mascot shift-left" src={gp(slots.find, allPoses)} alt="" style={getMascotStyle('find')}/>
            </button>
            <a className="tile" href="#deliver">
              <div className="tile-kicker">{t.delK}</div>
              <div className="tile-title">{t.delT}</div>
              <div className="tile-desc">{t.delD}</div>
              <span className="soon-badge">{t.soon}</span>

              <img className="tile-mascot size-lg shift-left" src={gp(slots.deliver, allPoses)} alt="" style={getMascotStyle('deliver')}/>
            </a>
          </div>
        </div>
      </section>

      <section className="sec">
        <div className="sec-wrap">
          <button type="button" className="sec-tile" onClick={()=>setShopOpen(true)} style={{textAlign:'inherit',font:'inherit',color:'inherit',width:'100%'}}>
            <div className="k">{t.storeK}</div>
            <h3>{t.storeT}</h3>
            <p>{t.storeD}</p>
            <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
            <img className="mini-m size-lg shift-left" src={gp(slots.store, allPoses)} alt="" style={getMascotStyle('store')}/>
          </button>
          <button type="button" className="sec-tile" onClick={()=>setLoyaltyOpen(true)} style={{textAlign:'inherit',font:'inherit',color:'inherit',width:'100%'}}>

            <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>

      </section>

                <rect x="170" y="148" width="220" height="32" fill="#FBF3E3" stroke="#0B1020" strokeWidth="2.5" rx="6"/>

                  <line x1="200" y1="150" x2="200" y2="178"/>
                  <line x1="230" y1="150" x2="230" y2="178"/>
                  <line x1="260" y1="150" x2="260" y2="178"/>
                  <line x1="290" y1="150" x2="290" y2="178"/>

                <text x="280" y="168" textAnchor="middle" fontFamily="'JetBrains Mono',monospace" fontSize="9" fontWeight="700" fill="#0B1020" opacity="0.6" letterSpacing="1.5">{LOC_STR[lang].parking}</text>

                {/* PEDESTRIANS — walking on the strip above the parking */}
                <g transform="translate(0, 140)">
                  <g className="ped-1"><g className="ped-bob-anim">
                    <circle cx="0" cy="-4" r="2.2" fill="#E86A1E"/>
