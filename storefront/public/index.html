                    <line x1="1.2" y1="2.2" x2="1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                  </g></g>
                </g>
                <g transform="translate(0, 138)">
                  <g className="ped-2"><g className="ped-bob-anim">
                    <circle cx="0" cy="-4" r="2.2" fill="#0B1020"/>
                    <rect x="-2.2" y="-1.8" width="4.4" height="4" rx="1.2" fill="#F3B6CE"/>
                    <line x1="-1.2" y1="2.2" x2="-1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                    <line x1="1.2" y1="2.2" x2="1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                  </g></g>
                </g>
                <g transform="translate(0, 142)">
                  <g className="ped-3"><g className="ped-bob-anim">
                    <circle cx="0" cy="-4" r="2.2" fill="#7BA845"/>
                    <rect x="-2.2" y="-1.8" width="4.4" height="4" rx="1.2" fill="#142974"/>
                    <line x1="-1.2" y1="2.2" x2="-1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                    <line x1="1.2" y1="2.2" x2="1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                  </g></g>
                </g>
                <g transform="translate(0, 144)">
                  <g className="ped-4"><g className="ped-bob-anim">
                    <circle cx="0" cy="-4" r="2.2" fill="#E86A1E"/>
                    <rect x="-2.2" y="-1.8" width="4.4" height="4" rx="1.2" fill="#0B1020"/>
                    <line x1="-1.2" y1="2.2" x2="-1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                    <line x1="1.2" y1="2.2" x2="1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                  </g></g>
                </g>
                <g transform="translate(0, 139)">
                  <g className="ped-5"><g className="ped-bob-anim">
                    <circle cx="0" cy="-4" r="2.2" fill="#0B1020"/>
                    <rect x="-2.2" y="-1.8" width="4.4" height="4" rx="1.2" fill="#F5922E"/>
                    <line x1="-1.2" y1="2.2" x2="-1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                    <line x1="1.2" y1="2.2" x2="1.2" y2="5" stroke="#0B1020" strokeWidth="1.2"/>
                  </g></g>
                </g>

                {/* CORNICHE ROAD (east-west) */}
                <rect x="0" y="184" width="600" height="44" fill="#3A4060"/>
                <path d="M 0 206 L 600 206" stroke="#FBF3E3" strokeWidth="2.5" strokeDasharray="12 10"/>

                {/* CARS on the corniche */}
                <g transform="translate(0, 195)">
                  <g className="car-1">
                    <rect x="-12" y="-5" width="24" height="10" rx="3" fill="#E86A1E" stroke="#0B1020" strokeWidth="1.4"/>
                    <rect x="-7" y="-3" width="6" height="4" rx="1" fill="#1E3A9F" opacity="0.6"/>
                    <circle cx="-7" cy="5" r="1.6" fill="#0B1020"/>
                    <circle cx="7" cy="5" r="1.6" fill="#0B1020"/>
                  </g>
                </g>
                <g transform="translate(0, 195)">
                  <g className="car-2">
                    <rect x="-11" y="-5" width="22" height="10" rx="3" fill="#FBF3E3" stroke="#0B1020" strokeWidth="1.4"/>
                    <rect x="-6" y="-3" width="5" height="4" rx="1" fill="#1E3A9F" opacity="0.6"/>
                    <circle cx="-6" cy="5" r="1.6" fill="#0B1020"/>
                    <circle cx="6" cy="5" r="1.6" fill="#0B1020"/>
                  </g>
                </g>
                <g transform="translate(0, 218)">
                  <g className="car-3">
                    <rect x="-12" y="-5" width="24" height="10" rx="3" fill="#1E3A9F" stroke="#0B1020" strokeWidth="1.4"/>
                    <rect x="1" y="-3" width="6" height="4" rx="1" fill="#FBF3E3" opacity="0.6"/>
                    <circle cx="-7" cy="5" r="1.6" fill="#0B1020"/>
                    <circle cx="7" cy="5" r="1.6" fill="#0B1020"/>
                  </g>
                </g>

                {/* CITY WALK — expanded south, takes old parking + old mall area + Noch sits INSIDE */}
                <rect x="170" y="234" width="220" height="146" fill="#F3B6CE" stroke="#0B1020" strokeWidth="3" rx="14"/>
                <text x="280" y="266" textAnchor="middle" fontFamily="'Baloo 2',sans-serif" fontSize="20" fontWeight="800" fill="#0B1020" letterSpacing="-0.5">{LOC_STR[lang].mall}</text>

                {/* SOUTH STREET (between City Walk & residential row) */}
                <rect x="0" y="384" width="600" height="22" fill="#3A4060"/>
                <path d="M 0 395 L 600 395" stroke="#FBF3E3" strokeWidth="1.5" strokeDasharray="8 8"/>

                {/* NORTH-SOUTH STREET (passes through roundabout) */}
                <rect x="412" y="228" width="40" height="252" fill="#3A4060"/>
                <path d="M 432 228 L 432 480" stroke="#FBF3E3" strokeWidth="1.5" strokeDasharray="8 8"/>

                {/* ROUNDABOUT — Beach Hotel */}
                <g transform="translate(432, 206)">
                  <circle r="28" fill="#FBF3E3" stroke="#0B1020" strokeWidth="3"/>
                  <circle r="15" fill="#7BA845" opacity="0.55"/>
                  <circle r="6" fill="#E86A1E"/>
                </g>
                {/* ESPRESSOLAB (east of roundabout, just south of corniche) */}
                <g transform="translate(525, 258)">
                  <rect x="-30" y="-22" width="60" height="44" rx="8" fill="#fff" stroke="#0B1020" strokeWidth="2.5"/>
                  <text textAnchor="middle" y="2" fontSize="18">☕</text>
                  <text y="36" textAnchor="middle" fontFamily="'JetBrains Mono',monospace" fontSize="8" fontWeight="700" fill="#0B1020" letterSpacing="0.5">ESPRESSOLAB</text>
                </g>

                {/* MIO CAFFE (far east, lower) */}
                <g transform="translate(540, 354)" opacity="0.85">
                  <rect x="-26" y="-16" width="52" height="32" rx="6" fill="#fff" stroke="#0B1020" strokeWidth="2"/>
                  <text textAnchor="middle" y="5" fontSize="13">🍴</text>
                  <text y="26" textAnchor="middle" fontFamily="'JetBrains Mono',monospace" fontSize="7" fontWeight="700" fill="#0B1020" opacity="0.75" letterSpacing="0.5">MIO CAFFE</text>
                </g>

                {/* Decorative neighborhood blocks */}
                <g opacity="0.5">
                  {/* west of city walk (residential strip — pavement runs full width above) */}
                  <rect x="20" y="234" width="60" height="68" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="92" y="234" width="65" height="68" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="20" y="312" width="60" height="68" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="92" y="312" width="65" height="68" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  {/* east of city walk */}
                  <rect x="465" y="298" width="55" height="56" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="528" y="298" width="55" height="56" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  {/* southern residential row, below south street */}
                  <rect x="20" y="416" width="55" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="85" y="416" width="68" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="163" y="416" width="58" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="231" y="416" width="58" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="299" y="416" width="58" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="367" y="416" width="40" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="465" y="416" width="55" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                  <rect x="528" y="416" width="55" height="50" rx="5" fill="#fff" stroke="#0B1020" strokeWidth="1.5"/>
                </g>

                {/* Hay Al-Andalus label */}
                <text x="40" y="446" fontFamily="'Baloo 2',sans-serif" fontSize="12" fontWeight="800" fill="#0B1020" opacity="0.55" letterSpacing="-0.3">{LOC_STR[lang].neigh}</text>

                {/* THE NOCH PIN — INSIDE City Walk */}
                <g transform="translate(280, 330)" style={{cursor:"pointer"}}>
                  <circle r="18" fill="#E86A1E" opacity="0.5" className="loc-pin-ring"/>
                  <circle r="18" fill="#FFFFFF" opacity="0.55" className="loc-pin-ring-2"/>
                  <g className="loc-pin-body">
                    <path d="M 0 -42 C -18 -42, -28 -28, -28 -14 C -28 4, -14 20, 0 42 C 14 20, 28 4, 28 -14 C 28 -28, 18 -42, 0 -42 Z"
                          fill="url(#locPinGrad)" stroke="#0B1020" strokeWidth="3"/>
                    <text textAnchor="middle" y="-8" fontSize="24" fontFamily="'Baloo 2',sans-serif" fontWeight="800" fill="#fff">N</text>
                  </g>
                </g>
              </svg>
            </div>

            <div className="infocard">
              <div className="info-name"><img className="info-name-logo" src="assets/noch-logo.png" alt={LOC.name[lang]}/></div>
              <div className="info-addr">
                {LOC.addrL1[lang]}<br/>
                {LOC.addrL2[lang]}<br/>
                {LOC.addrL3[lang]}
                <span className="city">{LOC.cityCountry[lang]}</span>
              </div>
              <div className="info-meta">
                <div className="info-row"><span className="ic h">⏰</span><span>{LOC.hours[lang]}</span></div>
                <div className="info-row"><span className="ic f">📅</span><span>{LOC.hoursFri[lang]}</span></div>
                <div className="info-row"><span className="ic p">📞</span><span dir="ltr">{LOC.phoneDisplay}</span></div>
              </div>
              <div className="info-actions">
                <a className="btn-dir" href={LOC.mapsUrl} target="_blank" rel="noopener">{LOC_STR[lang].getDir}</a>
                <div className="btn-row">
                  <a className="btn-mini" href={`tel:${LOC.phoneTel}`}>📞 {LOC_STR[lang].call}</a>
                  <a className="btn-mini" href={`https://wa.me/${LOC.whatsappNum}`} target="_blank" rel="noopener">💬 {LOC_STR[lang].wa}</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
        </div>
      </div>
      )}

      <div className="footer-wave">
        <svg viewBox="0 0 1440 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path fill="#2A4EBB" d="M0,30 C240,70 480,5 720,38 C960,70 1200,10 1440,42 L1440,90 L0,90 Z" opacity="0.7"/>
          <path fill="#1E3A9F" d="M0,50 C300,90 600,20 900,55 C1080,75 1260,35 1440,58 L1440,90 L0,90 Z"/>
        </svg>
      </div>
      <footer className="footer" style={{zIndex:2,position:"relative"}}>
        <div className="footer-inner" style={{position:"relative",zIndex:2}}>
          <div>
            <img src="assets/noch-logo.png" alt="noch" style={{height:120,width:"auto",filter:"brightness(0) invert(1)",marginBottom:16}}/>
            <p style={{marginTop:14,maxWidth:320,fontSize:14,opacity:.9,color:"#fff"}}>{t.fDesc}</p>
          </div>
          <div>
            <h5>{t.fVisit}</h5>
            <ul><li>{t.fAddr}</li><li>{t.fCity}</li><li>{t.fHours}</li></ul>
          </div>
          <div>
            <h5>{t.fConnect}</h5>
            <ul>
              <li><a href="#">Instagram</a></li>
              <li><a href="#">TikTok</a></li>
              <li><a href="https://apps.noch.cloud" target="_blank" rel="noopener">apps.noch.cloud</a></li>
            </ul>
          </div>
        </div>
        <div className="footer-bot">
          <div>{t.fRights}</div>
          <div>{t.fNochi}</div>
        </div>
      </footer>

      <BranchPickerModal open={pickerOpen} onClose={()=>setPickerOpen(false)} lang={lang} t={t}/>
      {loyaltyOpen && (
        <LoyaltyOverlay
          lang={lang}
          setLang={setLang}
          lt={LOY_STR[lang]}
          onClose={()=>setLoyaltyOpen(false)}
        />
      )}
      {shopOpen && (
        <ShopOverlay
          lang={lang}
          setLang={setLang}
          lt={LOY_STR[lang]}
          onClose={()=>setShopOpen(false)}
        />
      )}
      <TweaksPanel slots={slots} setSlots={setSlots} open={tweaksOpen} setOpen={setTweaksOpen} allPoses={allPoses} onUpload={addCustomPose} onClear={clearCustomPoses} pos={pos} onNudge={nudge} sizes={sizes} onResize={resizeMascot}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
