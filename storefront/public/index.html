<style>

  .tweaks-close{background:none;border:none;font-size:20px;cursor:pointer;color:#fff;font-weight:800}
  .tweaks-body{padding:16px 18px;display:flex;flex-direction:column;gap:20px}
  .tweak-group label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;color:#485070}
  .tweak-slot{display:flex;flex-wrap:wrap;gap:6px}
  .tweak-slot-label{font-family:'Baloo 2';font-weight:800;font-size:13px;color:var(--ink);margin-bottom:4px;width:100%}
  .pose-btn{width:48px;height:48px;border-radius:12px;border:2px solid var(--ink);background:var(--cream);padding:4px;cursor:pointer;transition:all .15s;overflow:hidden;display:grid;place-items:center}
  .pose-btn img{width:100%;height:100%;object-fit:contain}
  .pose-btn.active{background:var(--orange);border-color:var(--orange);box-shadow:3px 3px 0 var(--ink)}
  .pose-btn:hover{transform:scale(1.08)}
</style>
</head>

function gp(key, all){ return (all||POSES).find(p=>p.key===key)?.src || POSES[0].src; }

function TweaksPanel({ slots, setSlots, open, setOpen, allPoses, onUpload, onClear, pos, onNudge, sizes, onResize }){

    const next = {...slots, [sid]: pk};
    setSlots(next);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits: next}, "*");
  };
  const fr = useRef(null);
  return (
    <div className={`tweaks-panel ${open?"open":""}`} dir="ltr" lang="en">

        <h4>Tweaks</h4>
        <button className="tweaks-close" onClick={()=>setOpen(false)}>✕</button>

            onChange={(e)=>{Array.from(e.target.files).forEach(f=>onUpload(f));e.target.value="";}}/>
          <button onClick={()=>fr.current?.click()}
            style={{padding:"10px 18px",borderRadius:999,border:"2px solid var(--ink)",background:"var(--cream)",fontWeight:800,fontSize:13,cursor:"pointer",boxShadow:"3px 3px 0 var(--ink)",fontFamily:"inherit",display:"flex",alignItems:"center",gap:8}}>
            📁 Upload image(s)
          </button>
          {allPoses.filter(p=>p.custom).length > 0 && (
            <div style={{marginTop:10}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                {allPoses.filter(p=>p.custom).map(p=>(
                  <div key={p.key} className="pose-btn" title={p.label}><img src={p.src} alt={p.label}/></div>
                ))}
              </div>
              <button onClick={onClear}
                style={{padding:"7px 14px",borderRadius:999,border:"2px solid var(--orange)",background:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",color:"var(--orange)",fontFamily:"inherit"}}>
                🗑 Clear uploaded poses
              </button>
            </div>
          )}
        </div>
        <div className="tweak-group">
          <label>Nudge &amp; resize mascots</label>
          {['menu','find','deliver','store','loyalty'].map(sid=>{
            const p = pos[sid]||{x:0,y:0};
            const sz = sizes[sid]||260;
            const btnS = {width:28,height:28,border:"2px solid var(--ink)",borderRadius:6,background:"var(--cream)",fontWeight:800,fontSize:13,cursor:"pointer",display:"grid",placeItems:"center"};
            return (
              <div key={sid} style={{marginBottom:14}}>
                <div className="tweak-slot-label">{SLOTS.find(s=>s.id===sid)?.label} <span style={{opacity:.5,fontWeight:400,fontSize:11}}>x:{p.x} y:{p.y} · {sz}px</span></div>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,28px)",gap:4}}>
                    <div/><button style={btnS} onClick={()=>onNudge(sid,'y',-10)}>↑</button><div/>
                    <button style={btnS} onClick={()=>onNudge(sid,'x',-10)}>←</button>
                    <button style={{...btnS,fontSize:9,background:"#eee"}} onClick={()=>onNudge(sid,'_reset')}>●</button>
                    <button style={btnS} onClick={()=>onNudge(sid,'x',10)}>→</button>
                    <div/><button style={btnS} onClick={()=>onNudge(sid,'y',10)}>↓</button><div/>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                    <button style={btnS} onClick={()=>onResize(sid,20)}>＋</button>
                    <span style={{fontSize:10,fontFamily:"monospace",opacity:.6}}>{sz}</span>
                    <button style={btnS} onClick={()=>onResize(sid,-20)}>－</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="tweak-group">
          <label>Nochi pose per slot</label>
          {SLOTS.map(s=>(
            <div key={s.id} style={{marginBottom:14}}>
              <div className="tweak-slot-label">{s.label}</div>
              <div className="tweak-slot">
                {allPoses.map(p=>(
                  <button key={p.key} className={`pose-btn ${slots[s.id]===p.key?"active":""}`}
                    onClick={()=>patch(s.id, p.key)} title={p.label}>
                    <img src={p.src} alt={p.label}/>
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [lang, setLang] = useState(()=>localStorage.getItem("noch-lang")||"ar");
const [slots, setSlots] = useState(TWEAK_DEFAULTS);
  const [pos, setPos] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('noch-pos')||'null') || POS_DEFAULTS; }catch(e){return POS_DEFAULTS;}
  });
  const [sizes, setSizes] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('noch-sizes')||'null') || SIZE_DEFAULTS; }catch(e){return SIZE_DEFAULTS;}
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [customPoses, setCustomPoses] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('noch-custom-poses')||'[]'); }catch(e){return [];}
  });
  const allPoses = [...POSES, ...customPoses];
  const t = STR[lang];

  const addCustomPose = (file)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 800; // higher quality
        const scale = Math.min(MAX/img.width, MAX/img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        // Try high quality first, fall back to lower if localStorage full
        const tryStore = (quality) => {
          const dataUrl = canvas.toDataURL('image/png', quality);
          const key = "custom_" + Date.now();
          const np = { key, src: dataUrl, label: file.name.replace(/\.[^.]+$/,''), custom: true };
          setCustomPoses(prev=>{
            const next = [...prev, np];
            try {
              localStorage.setItem('noch-custom-poses', JSON.stringify(next));
              return next;
            } catch(err) {
              if (quality > 0.4) {
                // retry with lower quality
                tryStore(quality - 0.2);
                return prev;
              }
              console.warn('localStorage full, session-only');
              return next;
            }
          });
        };
        tryStore(0.95);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const nudge = (slotId, axis, delta)=>{
    if(axis === '_reset'){
      setPos(prev=>{ const next={...prev,[slotId]:{x:0,y:0}}; localStorage.setItem('noch-pos',JSON.stringify(next)); return next; });
      return;
    }
    setPos(prev=>{
      const next = {...prev, [slotId]: {...(prev[slotId]||{x:0,y:0}), [axis]: ((prev[slotId]||{x:0,y:0})[axis]||0) + delta}};
      localStorage.setItem('noch-pos', JSON.stringify(next));
      return next;
    });
  };

  const getMascotStyle = (slotId)=>{
    const p = pos[slotId]||{x:0,y:0};
    const s = sizes[slotId]||260;
    return { transform: `translate(${p.x}px, ${p.y}px)`, width:s, height:s };
  };

  const resizeMascot = (slotId, delta)=>{
    setSizes(prev=>{
      const next = {...prev, [slotId]: Math.max(80, Math.min(400, (prev[slotId]||260) + delta))};
      localStorage.setItem('noch-sizes', JSON.stringify(next));
      return next;
    });
  };

  const clearCustomPoses = ()=>{
    setCustomPoses([]);
    localStorage.removeItem('noch-custom-poses');
    const cleaned = {};
    Object.keys(slots).forEach(k=>{
      cleaned[k] = slots[k].startsWith('custom_') ? 'master' : slots[k];
    });
    setSlots(cleaned);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits: cleaned}, "*");
  };

  useEffect(()=>{
    localStorage.setItem("noch-lang", lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang==="ar"?"rtl":"ltr";
  },[lang]);

  useEffect(()=>{
    const onMsg = (e)=>{
      if(!e.data) return;
      if(e.data.type==="__activate_edit_mode") setTweaksOpen(true);
      if(e.data.type==="__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", onMsg);
  }, []);

  return (
    <React.Fragment>
      <section className="hero">
        <div className="nav-bar">
          <nav className="nav">
            <a href="#"><img className="nav-logo" src="assets/noch-logo.png" alt="Noch" style={{height:72,width:"auto",marginTop:-18,marginBottom:-18}}/></a>
            <div className="nav-links">
              <a href="#big3">{t.navMenu}</a>
              <a href="#find">{t.navFind}</a>
              <a href="#store">{t.navStore}</a>
              <a href="#loyalty">{t.navLoyalty}</a>
            </div>
            <div className="nav-right">
              <a href="https://apps.noch.cloud" target="_blank" rel="noopener" className="staff-lnk">{t.staff}</a>
              <button className="lang-btn" onClick={()=>setLang(lang==="en"?"ar":"en")}>
                {lang==="en"?"ع":"EN"}
              </button>
            </div>
          </nav>
        </div>

        <div className="hero-content">
          <div className="hero-layout">
            <div>
              <div className="nochi-pill">
                <img src={gp(slots.pill, allPoses)} alt=""/> {t.pill}
              </div>
              <h1>
                {t.h1a}<br/>
                {t.h1b} <span className="orange-pill">{t.h1c}</span>
              </h1>
              <p className="hero-sub">{t.sub}</p>
              <div className="hero-ctas">
                <a className="btn primary" href="#big3">{t.ctaMenu}</a>
                <a className="btn secondary" href="#find">{t.ctaFind}</a>
              </div>
            </div>
            <img className="hero-mascot" src={gp(slots.hero, allPoses)} alt="Nochi"/>
          </div>
        </div>
      </section>

      <section className="big3-section" id="big3">
        <div className="big3-wrap">
          <div className="big3">
            <a className="tile" href="#menu">
              <div className="tile-kicker">{t.menuK}</div>
              <div className="tile-title">{t.menuT}</div>
              <div className="tile-desc">{t.menuD}</div>
              <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
              <img className="tile-mascot shift-bottom" src={gp(slots.menu, allPoses)} alt="" style={getMascotStyle('menu')}/>
            </a>
            <a className="tile" href="#find" id="find">
              <div className="tile-kicker">{t.findK}</div>
              <div className="tile-title">{t.findT}</div>
              <div className="tile-desc">{t.findD}</div>
              <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
              <img className="tile-mascot shift-left" src={gp(slots.find, allPoses)} alt="" style={getMascotStyle('find')}/>
            </a>
            <a className="tile" href="#deliver">
              <div className="tile-kicker">{t.delK}</div>
              <div className="tile-title">{t.delT}</div>
              <div className="tile-desc">{t.delD}</div>
              <span className="soon-badge">{t.soon}</span>
              <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
              <img className="tile-mascot size-lg shift-left" src={gp(slots.deliver, allPoses)} alt="" style={getMascotStyle('deliver')}/>
            </a>
          </div>
        </div>
      </section>

      <section className="sec">
        <div className="sec-wrap">
          <a className="sec-tile" href="#store" id="store">
            <div className="k">{t.storeK}</div>
            <h3>{t.storeT}</h3>
            <p>{t.storeD}</p>
            <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
            <img className="mini-m size-lg shift-left" src={gp(slots.store, allPoses)} alt="" style={getMascotStyle('store')}/>
          </a>
          <a className="sec-tile" href="#loyalty" id="loyalty">
            <div className="k">{t.loyK}</div>
            <h3>{t.loyT}</h3>
            <p>{t.loyD}</p>
            <div className="tile-arrow">{lang==="ar"?"←":"→"}</div>
            <img className="mini-m" src={gp(slots.loyalty, allPoses)} alt="" style={getMascotStyle('loyalty')}/>
          </a>
        </div>
      </section>

      <footer className="footer" style={{zIndex:1,position:"relative"}}>
        <div className="footer-inner" style={{position:"relative",zIndex:2}}>
          <div>
            <img src="assets/noch-logo.png" alt="noch" style={{height:180,width:"auto",filter:"brightness(0) invert(1)",marginTop:-60,marginBottom:-20}}/>
            <p style={{marginTop:14,maxWidth:320,fontSize:14,opacity:.9,color:"#fff"}}>{t.fDesc}</p>
          </div>
          <div>
            <h5>{t.fVisit}</h5>
            <ul><li>{t.fAddr}</li><li>{t.fCity}</li><li>{t.fHours}</li></ul>
          </div>
          <div>
            <h5>{t.fConnect}</h5>
            <ul>
              <li><a href="#">Instagram</a></li>
              <li><a href="#">TikTok</a></li>
              <li><a href="https://apps.noch.cloud" target="_blank" rel="noopener">apps.noch.cloud</a></li>
            </ul>
          </div>
        </div>
        <div className="footer-bot">
          <div>{t.fRights}</div>
          <div>{t.fNochi}</div>
        </div>
      </footer>

      <TweaksPanel slots={slots} setSlots={setSlots} open={tweaksOpen} setOpen={setTweaksOpen} allPoses={allPoses} onUpload={addCustomPose} onClear={clearCustomPoses} pos={pos} onNudge={nudge} sizes={sizes} onResize={resizeMascot}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
